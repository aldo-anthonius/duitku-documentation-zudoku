openapi: 3.0.3
info:
  title: Duitku Disbursement API
  version: 1.0.0
  description: API Documentation for Duitku Disbursement feature.
servers:
  - url: https://da7f045c-5294-4f50-865d-4f08695b7b2e.mock.pstmn.io
    description: Postman Mock Server (Testing)
  - url: https://sandbox.duitku.com/webapi/api/disbursement
    description: Sandbox Server

# 1. SNAP AUTHORIZATION AND HEADERS
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Authentication with bearer token."

security:
  - BearerAuth: []

paths:
  /access-token/b2b:
    # servers:
    #   - url: https://snapdev.duitku.com/auth/v1.0
    #     description: Development Server
    #   - url: https://snap.duitku.com/auth/v1.0
    #     description: Production Server
    post:
      summary: 🔑 Get Access Token (B2B)
      security: [] # Mematikan global Bearer Token khusus untuk endpoint ini
      description: |
        When you're working with web APIs, a Bearer Token is an access token that is often used for authorization purposes. This token acts like a security key that a server uses to verify that the request is coming from an authenticated user or service.

        <div class="alert-box">
          <div class="alert-title">⚠️ Authentication Info</div>
          <div class="alert-content">
            To use a Bearer Token with the SNAP API, you need to obtain the token by providing your credentials to this authentication endpoint. <strong>This endpoint uses the <a href="/authentication#asymmetric">Asymmetric</a> Signature formula.</strong>
          </div>
        </div>
      tags:
        - Authentication
      
      parameters:
        - in: header
          name: Content-Type
          required: true
          schema:
            type: string
            default: "application/json"
          description: "String represents indicate the media type of the resource."
        - in: header
          name: X-TIMESTAMP
          required: true
          schema:
            type: string
            default: "2022-09-16T13:00:00+07:00"
          description: "ISO-8601 formatted timestamp."
        - in: header
          name: X-SIGNATURE
          required: true
          schema:
            type: string
            default: "xJhJTz9ddsPRds..."
          description: |
            Non-Repudiation & Integrity checking X-Signature with [Asymmetric](/authentication#asymmetric) algorithm. Formula: <br/>
            <code>stringToSign = ClientKey + "|" + Timestamp</code> <br/>
            <code>SHA256withRSA(Private_Key, stringToSign)</code>
        - in: header
          name: X-CLIENT-KEY
          required: true
          schema:
            type: string
            default: "DBXXXX"
          description: "Client Id for disbursement will be provided by Duitku. It'll have different with your project key."

      requestBody:
        required: true
        content:
          application/json:
            examples:
              get token:
                summary: "Request Bearer Token"
                value:
                  grantType: "client_credentials"
            schema:
              type: object
              required:
                - grantType
              properties:
                grantType:
                  type: string
                  description: "The value is 'client_credentials'"
                  example: "client_credentials"

      # ==========================================
      # RESPONSES GET TOKEN (SNAP STANDARD)
      # ==========================================
      responses:
        "200":
          description: "Successful processing and obtaining the accessToken"
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                    maxLength: 7
                    description: "Response Code will return status code of request result."
                    example: "2007300"
                  responseMessage:
                    type: string
                    description: "Response Message will return description of request result."
                    example: "Successful"
                  accessToken:
                    type: string
                    description: "String token will be use for every request SNAP API."
                    example: "ZGMyNDA3NWQtNmM4Ny00NGNILTQ2NTAtMDhkYWMxNTAzNzY0"
                  tokenType:
                    type: string
                    description: "Token type that has been created. SNAP use Bearer Token."
                    example: "Bearer"
                  expiresIn:
                    type: string
                    description: "Token duration that can be used. Value count in seconds. 900 seconds = 15 minutes."
                    example: "900"
        "400":
          description: "Bad Request - Invalid Field Format or Missing Mandatory Field"
          content:
            application/json:
              example:
                responseCode: "4007301"
                responseMessage: "Invalid Field Format {grantType}"
        "401":
          description: "Unauthorized - Invalid Client Key or Signature"
          content:
            application/json:
              example:
                responseCode: "4017300"
                responseMessage: "Invalid Client Key or Signature"

  /inquirysandbox:
    post:
      summary: 🔍 Inquiry Request
      description: |
        <div class="auth-box">
          <div class="auth-title">SNAP Authorization Headers</div>
          <div class="auth-content">
            This API uses SNAP BI standard headers. Ensure you provide the Bearer Token in the authorization configuration, and calculate the <strong>X-SIGNATURE</strong> carefully using the <a href="/authentication#symmetric">symmetric</a> formula:<br/><br/>
            <code>stringToSign = HttpMethod + ":" + Endpoint + ":" + AccessToken + ":" + LowerCase(HexEncode(SHA-256(Minify(RequestBody)))) + ":" + Timestamp</code><br/><br/>
            <code>signature = Base64(HMAC_SHA512(stringToSign, secretKey))</code>
          </div>
        </div>

        The first step in the disbursement process begins with making an inquiry to the Duitku system.
        
        <div class="alert-box">
          <div class="alert-title">⚠️ Important Notes</div>
          <div class="alert-content">
            <ul>
              <li>The <code>X-SIGNATURE</code> header must be generated dynamically on your backend.</li>
              <li><code>X-EXTERNAL-ID</code> must be unique for every single request.</li>
            </ul>
          </div>
        </div>
      tags:
        - Transfer Online
      
      parameters:
        - in: header
          name: Content-Type
          required: true
          schema:
            type: string
            default: "application/json"
          description: "String represents indicate the media type of the resource."
        - in: header
          name: X-TIMESTAMP
          required: true
          schema:
            type: string
            example: "2022-09-16T13:00:00+07:00"
            default: "2022-09-16T13:00:00+07:00"
          description: "ISO-8601 formatted timestamp."
        - in: header
          name: X-SIGNATURE
          required: true
          schema:
            type: string
            example: "xJhJTz9ddsPRds..."
          description: "Refer to symmetric signature formula."
        - in: header
          name: X-PARTNER-ID
          required: true
          schema:
            type: string
            example: "DBXXXX"
          description: "Partner ID for disbursement given by Duitku team."
        - in: header
          name: X-EXTERNAL-ID
          required: true
          schema:
            type: string
            example: "REQ-123456789"
          description: "Unique request ID. Need to be unique in every request."
        - in: header
          name: CHANNEL-ID
          required: true
          schema:
            type: string
            example: "95221"
          description: "Value should be 95221."

      requestBody:
        required: true
        content:
          application/json:
            examples:
              inquiry done:
                summary: "Skenario Sukses"
                value:
                  BeneficiaryAccountNo: "8760673566"
                  PartnerReferenceNo: "767366172360427800000"
                  BeneficiaryBankCode: "014"
                  AdditionalInfo:
                    DeviceId: "1234567890"
                    Channel: "api"
                    Remark: "Test Inquiry"
                    Amount:
                      Value: "10000.00"
                      Currency: "IDR"
                    CustomerReference: "Testing-1"
            schema:
              type: object
              required:
                - BeneficiaryAccountNo
                - PartnerReferenceNo
                - BeneficiaryBankCode
                - AdditionalInfo
              properties:
                BeneficiaryAccountNo:
                  type: string
                  maxLength: 34
                  description: "The beneficiary account number for transfer."
                  example: "8760673566"
                PartnerReferenceNo:
                  type: string
                  maxLength: 25
                  description: "A unique transaction ID. 1 ID for 1 inquiry. Will be use for trigger transfer."
                  example: "767366172360427800000"
                BeneficiaryBankCode:
                  type: string
                  description: |
                    The beneficiary account bank code for transfer. You can only enter bank codes that are connected to the H2H network with Duitku.
                    * BCA - 014
                    * BNI - 009
                    * BRI - 002
                    * Mandiri - 008
                    * Permata - 013
                    * CIMB Niaga - 022
                  example: "014"
                AdditionalInfo:
                  type: object
                  description: "Object value for additional information that need to be provide."
                  required:
                    - Amount
                  properties:
                    DeviceId:
                      type: string
                      description: "Device ID of the request origin."
                      example: "1234567890"
                    Channel:
                      type: string
                      description: "Channel of the transaction."
                      example: "api"
                    Remark:
                      type: string
                      description: "Remark is an information that attach to the transaction."
                      example: "Test Inquiry"
                    Amount:
                      type: object
                      description: "Object value that provide amount information."
                      required:
                        - Value
                        - Currency
                      properties:
                        Value:
                          type: string
                          description: "Numerical string of amount following with 2 digits decimals"
                          example: "10000.00"
                        Currency:
                          type: string
                          maxLength: 3
                          description: "Currency code as in ISO4217 for Indonesian Rupiah. It should be as IDR."
                          example: "IDR"
                    CustomerReference:
                      type: string
                      maxLength: 20
                      description: "Merchant customer reference. Could be use as transaction flag owner. Duitku will return it on the response. Duitku will generate random value if the parameter is not provided or empty."
                      example: "Testing-1"

      # ==========================================
      # RESPONSES INQUIRY (SNAP STANDARD)
      # ==========================================
      responses:
        "200":
          description: "Successful Request"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ResponseCode:
                    type: string
                    maxLength: 7
                    description: "Response Code will return status code of request result."
                    example: "2001600"
                  ResponseMessage:
                    type: string
                    description: "Response Message will return description of request result."
                    example: "Successful"
                  ReferenceNo:
                    type: string
                    maxLength: 25
                    description: "Duitku unique generated ID for transaction."
                    example: "599780"
                  PartnerReferenceNo:
                    type: string
                    maxLength: 25
                    description: "A unique transaction ID. 1 ID for 1 inquiry. Will be use for trigger transfer."
                    example: "767366172360427800000"
                  BeneficiaryAccountName:
                    type: string
                    maxLength: 100
                    description: "The beneficiary account name from the account that has been inquired."
                    example: "Testing Account"
                  BeneficiaryAccountNo:
                    type: string
                    maxLength: 34
                    description: "The beneficiary account number from the account that has been inquired."
                    example: "8760673566"
                  BeneficiaryBankCode:
                    type: string
                    maxLength: 8
                    description: "The beneficiary bank code from the account that has been inquired."
                    example: "014"
                  BeneficiaryBankName:
                    type: string
                    maxLength: 50
                    description: "The beneficiary bank name from the account that has been inquired."
                    example: "BANK CENTRAL ASIA"
                  AdditionalInfo:
                    type: object
                    description: "Object value for additional information that provided by Duitku."
                    properties:
                      DeviceId:
                        type: string
                        description: "Device ID of the request origin."
                        example: "1234567890"
                      Channel:
                        type: string
                        description: "Channel of the transaction."
                        example: "api"
                      Remark:
                        type: string
                        description: "Remark is an information that attach to the transaction."
                        example: "Test Inquiry"
                      Amount:
                        type: object
                        description: "Object value that provide amount information."
                        properties:
                          Value:
                            type: string
                            description: "Numerical string of amount following with 2 digits decimals"
                            example: "10000.00"
                          Currency:
                            type: string
                            description: "Currency code as in ISO4217 for Indonesian Rupiah. It should be as IDR."
                            example: "IDR"
                      CustomerReference:
                        type: string
                        maxLength: 25
                        description: "Merchant customer reference. Could be use as transaction flag owner."
                        example: "Testing-1"
                        
  /transfersandbox:
    post:
      summary: 💸 Transfer Request
      description: |
        <div class="auth-box">
          <div class="auth-title">SNAP Authorization Headers</div>
          <div class="auth-content">
            This API uses SNAP BI standard headers. Ensure you provide the Bearer Token in the authorization configuration, and calculate the <strong>X-SIGNATURE</strong> carefully using the <a href="/authentication#symmetric">symmetric</a> formula:<br/><br/>
            <code>stringToSign = HttpMethod + ":" + Endpoint + ":" + AccessToken + ":" + LowerCase(HexEncode(SHA-256(Minify(RequestBody)))) + ":" + Timestamp</code><br/><br/>
            <code>signature = Base64(HMAC_SHA512(stringToSign, secretKey))</code>
          </div>
        </div>

        The second step to execute the transfer after successfully validating the destination account via the Inquiry process.
        
        <div class="alert-box">
          <div class="alert-title">⚠️ Important Notes</div>
          <div class="alert-content">
            <ul>
              <li>The <code>X-SIGNATURE</code> header must be generated dynamically on your backend.</li>
              <li><code>partnerReferenceNo</code> must be exactly the same as the one used in the previous Inquiry request to trigger the transfer.</li>
            </ul>
          </div>
        </div>
      tags:
        - Transfer Online
      
      parameters:
        - in: header
          name: Content-Type
          required: true
          schema:
            type: string
            default: "application/json"
          description: "String represents indicate the media type of the resource."
        - in: header
          name: X-TIMESTAMP
          required: true
          schema:
            type: string
            example: "2022-09-16T13:00:00+07:00"
          description: "ISO-8601 formatted timestamp."
        - in: header
          name: X-SIGNATURE
          required: true
          schema:
            type: string
            example: "xJhJTz9ddsPRds..."
          description: "Refer to symmetric signature formula."
        - in: header
          name: X-PARTNER-ID
          required: true
          schema:
            type: string
            example: "DBXXXX"
          description: "Partner ID for disbursement given by Duitku team."
        - in: header
          name: X-EXTERNAL-ID
          required: true
          schema:
            type: string
            example: "REQ-123456789"
          description: "Unique request ID. Need to be unique in every request."
        - in: header
          name: CHANNEL-ID
          required: true
          schema:
            type: string
            example: "95221"
          description: "Value should be 95221."

      requestBody:
        required: true
        content:
          application/json:
            examples:
              transfer success:
                summary: "Skenario Sukses"
                value:
                  PartnerReferenceNo: "767366172360427800000"
                  SourceAccountNo: "XXXXX"
                  BeneficiaryAccountName: "Testing Account"
                  BeneficiaryAccountNo: "8760673566"
                  BeneficiaryAddress: "Jl. Sudirman No 1, Jakarta"
                  BeneficiaryBankCode: "014"
                  BeneficiaryBankName: "BANK CENTRAL ASIA"
                  BeneficiaryEmail: "test@example.com"
                  TransactionDate: "2024-08-08T11:15:38+07:00"
                  Amount:
                    Value: "10000.00"
                    Currency: "IDR"
                  AdditionalInfo:
                    DeviceId: "1234567890"
                    Channel: "api"
                    Remark: "Test Transfer"
                    Amount:
                      Value: "10000.00"
                      Currency: "IDR"
                    CustomerReference: "Testing-1"
            schema:
              type: object
              required:
                - PartnerReferenceNo
                - SourceAccountNo
                - BeneficiaryAccountName
                - BeneficiaryAccountNo
                - BeneficiaryBankCode
                - TransactionDate
                - Amount
                - AdditionalInfo
              properties:
                PartnerReferenceNo:
                  type: string
                  maxLength: 25
                  description: "A unique transaction ID. 1 ID for 1 inquiry. Will be use for trigger transfer."
                  example: "767366172360427800000"
                SourceAccountNo:
                  type: string
                  maxLength: 19
                  description: "Your Account Number for disbursement will be provided by Duitku."
                  example: "XXXXX"
                BeneficiaryAccountName:
                  type: string
                  maxLength: 100
                  description: "The beneficiary account name."
                  example: "Testing Account"
                BeneficiaryAccountNo:
                  type: string
                  maxLength: 34
                  description: "The beneficiary account number for transfer."
                  example: "8760673566"
                BeneficiaryAddress:
                  type: string
                  description: "The address of the beneficiary."
                  example: "Jl. Sudirman No 1, Jakarta"
                BeneficiaryBankCode:
                  type: string
                  maxLength: 8
                  description: "The beneficiary account bank code for transfer."
                  example: "014"
                BeneficiaryBankName:
                  type: string
                  maxLength: 50
                  description: "The beneficiary bank name."
                  example: "BANK CENTRAL ASIA"
                BeneficiaryEmail:
                  type: string
                  description: "The email address of the beneficiary."
                  example: "test@example.com"
                TransactionDate:
                  type: string
                  description: "Date transaction use format ISO 8601."
                  example: "2024-08-08T11:15:38+07:00"
                Amount:
                  type: object
                  description: "Object value that provide amount information."
                  required:
                    - Value
                    - Currency
                  properties:
                    Value:
                      type: string
                      description: "Numerical string of amount following with 2 digits decimals."
                      example: "10000.00"
                    Currency:
                      type: string
                      maxLength: 3
                      description: "Currency code as in ISO4217 for Indonesian Rupiah. It should be as IDR."
                      example: "IDR"
                AdditionalInfo:
                  type: object
                  description: "Object value for additional information that need to be provide."
                  properties:
                    DeviceId:
                      type: string
                      description: "Device ID of the request origin."
                      example: "1234567890"
                    Channel:
                      type: string
                      description: "Channel of the transaction."
                      example: "api"
                    Remark:
                      type: string
                      maxLength: 100
                      description: "Remark is an information that attach to the transaction."
                      example: "Test Transfer"
                    Amount:
                      type: object
                      description: "Object value that provide amount information."
                      properties:
                        Value:
                          type: string
                          description: "Numerical string of amount following with 2 digits decimals"
                          example: "10000.00"
                        Currency:
                          type: string
                          description: "Currency code as in ISO4217 for Indonesian Rupiah. It should be as IDR."
                          example: "IDR"
                    CustomerReference:
                      type: string
                      maxLength: 25
                      description: "Merchant customer reference. Could be use as transaction flag owner."
                      example: "Testing-1"

      # ==========================================
      # RESPONSES TRANSFER (SNAP STANDARD)
      # ==========================================
      responses:
        "200":
          description: "Successful Transfer"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ResponseCode:
                    type: string
                    maxLength: 7
                    description: "Response Code will return status code of request result."
                    example: "2001700"
                  ResponseMessage:
                    type: string
                    description: "Response Message will return description of request result."
                    example: "Successful"
                  ReferenceNo:
                    type: string
                    maxLength: 25
                    description: "Duitku unique generated ID for transaction."
                    example: "618392"
                  PartnerReferenceNo:
                    type: string
                    maxLength: 25
                    description: "A unique transaction ID. 1 ID for 1 inquiry. Will be use for trigger transfer."
                    example: "417185632380714400000"
                  BeneficiaryAccountName:
                    type: string
                    maxLength: 100
                    description: "The beneficiary account name."
                    example: "Testing Account"
                  BeneficiaryAccountNo:
                    type: string
                    maxLength: 34
                    description: "The beneficiary account number."
                    example: "8760673566"
                  BeneficiaryAddress:
                    type: string
                    description: "The address of the beneficiary."
                    example: "Jl. Sudirman No 1, Jakarta"
                  BeneficiaryBankCode:
                    type: string
                    maxLength: 8
                    description: "The beneficiary bank code."
                    example: "014"
                  BeneficiaryBankName:
                    type: string
                    maxLength: 50
                    description: "The beneficiary bank name."
                    example: "BANK CENTRAL ASIA"
                  BeneficiaryEmail:
                    type: string
                    description: "The email address of the beneficiary."
                    example: "test@example.com"
                  TransactionDate:
                    type: string
                    description: "Date transaction use format ISO 8601."
                    example: "2024-08-08T11:15:38+07:00"
                  Amount:
                    type: object
                    description: "Object value that provide amount information."
                    properties:
                      Value:
                        type: string
                        description: "Numerical string of amount following with 2 digits decimals."
                        example: "10000.00"
                      Currency:
                        type: string
                        maxLength: 3
                        description: "Currency code as in ISO4217 for Indonesian Rupiah. It should be as IDR."
                        example: "IDR"
                  AdditionalInfo:
                    type: object
                    description: "Object value for additional information that provided by Duitku."
                    properties:
                      DeviceId:
                        type: string
                        description: "Device ID of the request origin."
                        example: "1234567890"
                      Channel:
                        type: string
                        description: "Channel of the transaction."
                        example: "api"
                      Remark:
                        type: string
                        description: "Remark is an information that attach to the transaction."
                        example: "Test Transfer"
                      BillType:
                        type: string
                        description: "Transfer type method."
                        example: "INTERBANK"
                      Amount:
                        type: object
                        description: "Object value that provide amount information."
                        properties:
                          Value:
                            type: string
                            description: "Numerical string of amount following with 2 digits decimals"
                            example: "10000.00"
                          Currency:
                            type: string
                            description: "Currency code as in ISO4217 for Indonesian Rupiah. It should be as IDR."
                            example: "IDR"
                      CustomerReference:
                        type: string
                        maxLength: 25
                        description: "Merchant customer reference. Could be use as transaction flag owner."
                        example: "Testing-1"
                        
  /checkbalance:
    post:
      summary: 💰 Check Balance
      description: |
        <div class="auth-box">
          <div class="auth-title">SNAP Authorization Headers</div>
          <div class="auth-content">
            This API uses SNAP BI standard headers. Ensure you provide the Bearer Token in the authorization configuration, and calculate the <strong>X-SIGNATURE</strong> carefully using the symmetric formula:<br/><br/>
            <code>stringToSign = HttpMethod + ":" + Endpoint + ":" + AccessToken + ":" + LowerCase(HexEncode(SHA-256(Minify(RequestBody)))) + ":" + Timestamp</code><br/><br/>
            <code>signature = Base64(HMAC_SHA512(stringToSign, secretKey))</code>
          </div>
        </div>

        Use this API to check the available balance of your merchant account before performing a disbursement.
      tags:
        - Check Balance
      
      parameters:
        - in: header
          name: Content-Type
          required: true
          schema:
            type: string
            default: "application/json"
          description: "String represents indicate the media type of the resource."
        - in: header
          name: X-TIMESTAMP
          required: true
          schema:
            type: string
            example: "2022-09-16T13:00:00+07:00"
          description: "ISO-8601 formatted timestamp."
        - in: header
          name: X-SIGNATURE
          required: true
          schema:
            type: string
            example: "xJhJTz9ddsPRds..."
          description: "Refer to symmetric signature formula."
        - in: header
          name: X-PARTNER-ID
          required: true
          schema:
            type: string
            example: "DBXXXX"
          description: "Partner ID for disbursement given by Duitku team."
        - in: header
          name: X-EXTERNAL-ID
          required: true
          schema:
            type: string
            example: "REQ-123456789"
          description: "Unique request ID. Need to be unique in every request."
        - in: header
          name: CHANNEL-ID
          required: true
          schema:
            type: string
            example: "95221"
          description: "Value should be 95221."

      requestBody:
        required: true
        content:
          application/json:
            examples:
              check balance:
                summary: "Check Balance"
                value:
                  PartnerReferenceNo: "767366172360427800000"
                  AccountNo: "XXXXX"
            schema:
              type: object
              required:
                - PartnerReferenceNo
                - AccountNo
              properties:
                PartnerReferenceNo:
                  type: string
                  maxLength: 25
                  description: "A unique transaction ID. Will be used for tracking."
                  example: "767366172360427800000"
                AccountNo:
                  type: string
                  maxLength: 19
                  description: "Your Account Number for disbursement will be provided by Duitku."
                  example: "XXXXX"

      # ==========================================
      # RESPONSES CHECK BALANCE (SNAP STANDARD)
      # ==========================================
      responses:
        "200":
          description: "Successful Balance Inquiry"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ResponseCode:
                    type: string
                    maxLength: 7
                    description: "Response Code will return status code of request result."
                    example: "2001100"
                  ResponseMessage:
                    type: string
                    description: "Response Message will return description of request result."
                    example: "Success"
                  AccountInfo:
                    type: array
                    description: "Array Object value. Information balance of your account in Duitku."
                    items:
                      type: object
                      properties:
                        Amount:
                          type: object
                          description: "Object value. Your balance Information."
                          properties:
                            Value:
                              type: string
                              description: "Numerical string of amount following with 2 digits decimals."
                              example: "10000.00"
                            Currency:
                              type: string
                              maxLength: 3
                              description: "Currency code as in ISO4217 for Indonesian Rupiah. It should be as IDR."
                              example: "IDR"
                        AvailableBalance:
                          type: object
                          description: "Object value. Your effective balance Information."
                          properties:
                            Value:
                              type: string
