  /checkstatus:
    post:
      summary: 🔎 Check Status
      description: |
        <div class="auth-box">
          <div class="auth-title">SNAP Authorization Headers</div>
          <div class="auth-content">
            This API uses SNAP BI standard headers. Ensure you provide the Bearer Token in the authorization configuration, and calculate the <strong>X-SIGNATURE</strong> carefully using the symmetric formula:<br/><br/>
            <code>stringToSign = HttpMethod + ":" + Endpoint + ":" + AccessToken + ":" + LowerCase(HexEncode(SHA-256(Minify(RequestBody)))) + ":" + Timestamp</code><br/><br/>
            <code>signature = Base64(HMAC_SHA512(stringToSign, secretKey))</code>
          </div>
        </div>

        Use this API to check the latest status of a disbursement transaction. 
        
        <div class="alert-box">
          <div class="alert-title">ℹ️ Note</div>
          <div class="alert-content">
            You can send one parameter between <code>OriginalPartnerReferenceNo</code> or <code>OriginalReferenceNo</code> on the request. Otherwise, you can also send both.
          </div>
        </div>
      tags:
        - Check Status
      
      parameters:
        - in: header
          name: Content-Type
          required: true
          schema:
            type: string
            default: "application/json"
          description: "String represents indicate the media type of the resource."
        - in: header
          name: X-TIMESTAMP
          required: true
          schema:
            type: string
            example: "2022-09-16T13:00:00+07:00"
          description: "ISO-8601 formatted timestamp."
        - in: header
          name: X-SIGNATURE
          required: true
          schema:
            type: string
            example: "xJhJTz9ddsPRds..."
          description: "Refer to symmetric signature formula."
        - in: header
          name: X-PARTNER-ID
          required: true
          schema:
            type: string
            example: "DBXXXX"
          description: "Partner ID for disbursement given by Duitku team."
        - in: header
          name: X-EXTERNAL-ID
          required: true
          schema:
            type: string
            example: "REQ-123456789"
          description: "Unique request ID. Need to be unique in every request."
        - in: header
          name: CHANNEL-ID
          required: true
          schema:
            type: string
            example: "95221"
          description: "Value should be 95221."

      requestBody:
        required: true
        content:
          application/json:
            examples:
              check status:
                summary: "Check Status Request"
                value:
                  OriginalPartnerReferenceNo: "810690490886716300000"
                  OriginalReferenceNo: "602169"
                  OriginalExternalId: "REQ-123456789"
                  ServiceCode: "18"
                  TransactionDate: "2024-08-08T11:15:38+07:00"
                  Amount:
                    Value: "10000.00"
                    Currency: "IDR"
                  AdditionalInfo:
                    DeviceId: "1234567890"
                    Channel: "api"
                    Remark: "Check Status"
                    Amount:
                      Value: "10000.00"
                      Currency: "IDR"
                    CustomerReference: "Testing-1"
            schema:
              type: object
              required:
                - ServiceCode
                - TransactionDate
                - Amount
                - AdditionalInfo
              properties:
                OriginalPartnerReferenceNo:
                  type: string
                  maxLength: 25
                  description: "A unique transaction ID that has been used for the transaction. The related ID is required if OriginalReferenceNo is empty."
                  example: "810690490886716300000"
                OriginalReferenceNo:
                  type: string
                  maxLength: 25
                  description: "Duitku unique generated ID transaction. The related ID is required if OriginalPartnerReferenceNo is empty."
                  example: "602169"
                OriginalExternalId:
                  type: string
                  description: "The original external ID used in the transaction request."
                  example: "REQ-123456789"
                ServiceCode:
                  type: string
                  maxLength: 2
                  description: |
                    The related API service code that transaction has been transfered.
                    * 17 - Intrabank
                    * 18 - BI-FAST, Interbank
                    * 22 - RTGS
                    * 23 - SKN
                  example: "18"
                TransactionDate:
                  type: string
                  description: "Date transaction use format ISO 8601."
                  example: "2024-08-08T11:15:38+07:00"
                Amount:
                  type: object
                  description: "Object value that provide amount information."
                  required:
                    - Value
                    - Currency
                  properties:
                    Value:
                      type: string
                      description: "Numerical string of amount following with 2 digits decimals."
                      example: "10000.00"
                    Currency:
                      type: string
                      maxLength: 3
                      description: "Currency code as in ISO4217 for Indonesian Rupiah. It should be as IDR."
                      example: "IDR"
                AdditionalInfo:
                  type: object
                  description: "Object value for additional information that need to be provide."
                  properties:
                    DeviceId:
